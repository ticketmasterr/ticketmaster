<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Ticket UI</title>
 
 <style>
  body {
   margin: 0;
   background: #f4f4f4;
   font-family: Arial, sans-serif;
  }
  
  /* Header */
  .header {
   background: #2d5bd1;
   color: #fff;
   padding: 15px;
   display: flex;
   align-items: center;
  }
  
  .back {
   font-size: 20px;
   margin-right: 10px;
   cursor: pointer;
  }
  
  .title {
   font-weight: bold;
   font-size: 16px;
  }
  
  .subtitle {
   font-size: 12px;
   opacity: 0.9;
  }
  
  /* Container */
  .container {
   max-width: 340px;
   margin: 20px auto;
  }
  
  /* Wallet notice */
  .notice {
   border: 1px solid #caa6ff;
   border-radius: 10px;
   padding: 10px;
   display: flex;
   align-items: center;
   font-size: 13px;
   background: #fff;
  }
  
  .notice img {
   width: 20px;
   margin-right: 8px;
  }
  
  /* Ticket card */
  .ticket {
   margin-top: 15px;
   border-radius: 12px;
   overflow: hidden;
   background: #fff;
   box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }
  
  .ticket-header {
   background: #2d5bd1;
   color: #fff;
   text-align: center;
   padding: 10px;
   font-weight: bold;
  }
  
  .ticket-info {
   background: #3c6ee6;
   color: #fff;
   text-align: center;
   padding: 15px;
  }
  
  .ticket-info .labels {
   font-size: 12px;
  }
  
  .ticket-info .values {
   font-size: 22px;
   font-weight: bold;
   margin-top: 5px;
  }
  
  .ticket-info table {
   width: 100%;
  }
  
  /* Barcode */
  .barcode-container {
   padding: 20px;
   text-align: center;
   position: relative;
  }
  
  .barcode {
 height: 90px;
 background: #fff;
 position: relative;
 overflow: hidden;
 display: flex;
 align-items: center;
}

.bars {
 display: flex;
 height: 100%;
 width: 100%;
}

.bar {
 height: 100%;
 background: #000;
}
  
  /* Scanning line */
  .scan-line {
   position: absolute;
   top: 0;
   width: 6px;
   height: 100%;
   background: rgba(0, 123, 255, 0.7);
   animation: scan 2s linear infinite;
  }
  
  @keyframes scan {
   from {
    left: 0;
   }
   
   to {
    left: 100%;
   }
  }
  
  .barcode-text {
   font-size: 12px;
   color: #666;
   margin-top: 10px;
  }
  
  /* Apple Wallet Button */
  .wallet-btn {
   background: #000;
   color: #fff;
   padding: 10px;
   border-radius: 8px;
   display: inline-flex;
   align-items: center;
   gap: 8px;
   margin-top: 10px;
   cursor: pointer;
  }
  
  .wallet-btn img {
   width: 20px;
  }
  
  /* Bottom buttons */
  .actions {
   display: flex;
   gap: 10px;
   margin-top: 15px;
  }
  
  .btn {
   flex: 1;
   padding: 12px;
   text-align: center;
   border-radius: 8px;
   color: #fff;
   cursor: pointer;
  }
  
  .transfer {
   background: #2d5bd1;
  }
  
  .sell {
   background: #ccc;
   color: #333;
  }
 </style>
 
</head>

<body>
 
 <!-- Header -->
 <div class="header">
  <div class="back">←</div>
  <div>
   <div class="title">Colter Wall with Special Guest Vincent Neil</div>
   <div class="subtitle">Sat • Feb 18 • 8:00 PM • 713 Music Hall</div>
  </div>
 </div>
 
 <div class="container">
  
  <!-- Notice -->
  <div class="notice">
   <img src="https://img.icons8.com/ios-filled/50/wallet.png">
   <div>Add to Apple Wallet to beat busy network connections at the event.</div>
  </div>
  
  <!-- Ticket -->
  <div class="ticket">
   
   <div class="ticket-header">Standard Ticket</div>
   
   <div class="ticket-info">
    <table>
     <tr class="labels">
      <td>SEC</td>
      <td>ROW</td>
      <td>SEAT</td>
     </tr>
     <tr class="values">
      <td>106</td>
      <td>DD</td>
      <td>8</td>
     </tr>
    </table>
    <div style="margin-top:10px; font-size:13px;">Floor 106 Right</div>
   </div>
   
   <!-- Barcode -->
   <div class="barcode-container">
    <div class="barcode">
     <div class="bars" id="barcodeBars"></div>
     <div class="scan-line"></div>
    </div>
    <div class="barcode-text">Screenshots won't get you in.</div>
    
    <div class="wallet-btn">
     <img src="https://img.icons8.com/ios-filled/50/apple-wallet.png">
     Add to Apple Wallet
    </div>
   </div>
   
  </div>
  
  <!-- Actions -->
  <div class="actions">
   <div class="btn transfer">Transfer</div>
   <div class="btn sell">Sell</div>
  </div>
  
 </div>
 
 <script>
 const container = document.getElementById("barcodeBars");
 
 function generateBarcode() {
  container.innerHTML = "";
  
  let totalWidth = 0;
  
  while (totalWidth < 100) {
   let width = Math.floor(Math.random() * 4) + 1; // 1px–4px random
   let gap = Math.floor(Math.random() * 3) + 1; // space between bars
   
   // black bar
   let bar = document.createElement("div");
   bar.className = "bar";
   bar.style.width = width + "px";
   container.appendChild(bar);
   
   // white gap
   let space = document.createElement("div");
   space.style.width = gap + "px";
   container.appendChild(space);
   
   totalWidth += width + gap;
  }
 }
 
 generateBarcode();
</script>
 
</body>

</html>
